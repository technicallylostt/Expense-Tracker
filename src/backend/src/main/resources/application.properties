# Server Configuration
server.port=8080

# Database Configuration
spring.datasource.url=jdbc:postgresql://localhost:5432/expensetracker
spring.datasource.username=kirti_user
spring.datasource.password=post123
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect


# JWT Configuration
jwt.secret=super-secret-jwt-key-that-is-at-least-256-bits-long-for-hmac-sha256-algorithm
jwt.expiration=86400

# Logging Configuration
logging.level.org.springframework.security=DEBUG
logging.level.com.expensetracker=DEBUG

# File Upload Configuration
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB 