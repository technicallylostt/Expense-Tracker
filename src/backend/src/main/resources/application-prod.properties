# Production Configuration
server.port=${PORT:8080}

# Database Configuration (Railway Postgres variables)
spring.datasource.url=jdbc:postgresql://${PGHOST}:${PGPORT}/${PGDATABASE}
spring.datasource.username=${PGUSER}
spring.datasource.password=${PGPASSWORD}
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# JWT Configuration (Use strong secret in production)
jwt.secret=${JWT_SECRET:your-super-secret-jwt-key-that-is-at-least-256-bits-long-for-hmac-sha256-algorithm}
jwt.expiration=${JWT_EXPIRATION:86400}

# Logging Configuration
logging.level.org.springframework.security=INFO
logging.level.com.expensetracker=INFO

# CORS Configuration
spring.web.cors.allowed-origins=${CORS_ORIGINS:https://expense-tracker-production-253d.up.railway.app,http://localhost:3000}
spring.web.cors.allowed-methods=GET,POST,PUT,DELETE,OPTIONS
spring.web.cors.allowed-headers=*

# Security Configuration
spring.security.user.name=${ADMIN_USERNAME:admin}
spring.security.user.password=${ADMIN_PASSWORD:admin123} 